<!DOCTYPE html>
<html>

<head>
    <title>Praktikum PDW 3</title>
    <style>
        /* Desain agar konten di tengah */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        button {
            margin: 5px;
            padding: 10px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Menampilkan Tanggal Dengan JavaScript</h1>
        <div id="tanggal"></div>

        <br>
        <button onclick="tampil()">Klik Tombol</button>
        <button onclick="show()">Tampilkan Perkenalan</button>

        <script>
            // alert (menampilkan pesan pada browser)
            alert("Ini sebuah alert");
        </script>

        <script src="script.js"></script>
    </div>

</body>

</html>
